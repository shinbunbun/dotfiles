name: Scan Vulnerabilities

# Nix サプライチェーン脆弱性スキャン (公開 dotfiles 版)。
# nix-ci-workflows の reusable workflow を discover-targets で fan-out して呼ぶ。
# 検証/設計: dotfiles-private Issue #276 / delta スキャン #284
#
# 注: dotfiles-private は self-hosted runner (skip-nix-install) 前提だが、公開 dotfiles の
# 既存 ci.yaml は GitHub-hosted runner (ubuntu-latest / macos-latest + cachix install-nix-action)
# を使う。本ワークフローも同じ runner 構成に合わせ、skip-nix-install は付けない
# (nix を都度インストールする)。aggregate/delta-gate は inline で nix run を使うため
# cachix/install-nix-action で nix を導入する。
#
# トリガー方針 (auto-update-flake.lock 前提):
#   - push:main[flake.lock/*.nix] = 確定スキャン。main にマージされた閉包を scan → 集約 Issue を upsert。
#   - pull_request (paths フィルタ無し) = delta スキャン (#284)。PR の閉包を main 最新スキャンと diff し、
#                              「この PR が新規流入/解消した CVE」を PR コメントに upsert。
#                              新規流入があれば delta-gate を fail させ auto-merge をブロックする (#284 blocking)。
#   - schedule (weekly)      = 安全網。auto-update が stuck して closure が動かない時の periodic scan。
#   - workflow_dispatch      = 手動。
#
# context 分岐:
#   pull_request 時          → changes で閉包関連ファイル変更を検出 → 関連時のみ scan + delta-gate。
#                              delta-gate は PR で必ず実行 (required status check 化のため)。
#   push:main/schedule/dispatch → changes は relevant=true を出力して scan → aggregate (upsert)。delta-gate はスキップ。
#
# delta-gate を ruleset の required status check に登録することで auto-merge をブロックする。
# pull_request の paths フィルタを外しているのは、関連変更の無い PR でも delta-gate が必ず
# 「報告」され、required check 未報告で PR が永久 block される落とし穴を避けるため
# (関連変更が無ければ delta-gate は即 pass)。

on:
  push:
    branches: [main]
    # pull_request の delta と同じ「閉包を変えうる変更」を対象にし、main 側の集約 Issue を
    # 同じ粒度で reconcile する (flake.lock だけだと *.nix 編集マージで集約 Issue が更新されない)。
    paths:
      - 'flake.lock'
      - 'flake.nix'
      - '**/*.nix'
  pull_request:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

# 集約 Issue を upsert する非 PR コンテキスト (push:main / schedule / dispatch) は定数 group 'main' で
# 直列化し重複 upsert を防ぐ。PR は per-ref group + cancel-in-progress で、連続 push 時に古い run を
# 畳んで runner を節約する (delta はコメント upsert なので最新だけ残れば良い)。
concurrency:
  group: scan-vulnerabilities-${{ github.event_name == 'pull_request' && format('pr-{0}', github.ref) || 'main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # 閉包関連ファイル (flake.lock/flake.nix/*.nix) が変わったか判定し relevant を出力。
  # 全イベントで必ず実行する: 非 PR (push:main/schedule/dispatch) では relevant=true を即出力。
  # 以前は `if: pull_request` で非 PR ではこのジョブが skip され、discover の needs:[changes] が
  # 「skip された need」になって reusable workflow の outputs (has-nixos) が下流 scan に伝播せず、
  # main push の scan が丸ごと skip = baseline artifact も集約 Issue も更新停止する罠に嵌っていた。
  # 常に success させることで discover の needs を満たし出力伝播を正常化する。
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # gh pr view --json files に必須 (無いと GraphQL 403 → 誤判定)
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - name: Detect closure-relevant changes
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # 非 PR は paths フィルタ (push:main) / 安全網 (schedule/dispatch) で既に閉包関連に
          # 限定されているので常に scan する。PR 番号も無いので gh は呼ばない。
          if [ "$EVENT" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "::notice::非 PR ($EVENT) → relevant=true (scan 実行)"
            exit 0
          fi
          # 注: 閉包は *.nix/flake.lock 以外 (derivation が readFile/import する patch/script/
          # vendored lockfile 等) でも変わりうるので、この判定は厳密ではない。ただし auto-merge
          # 対象の auto-update PR は必ず flake.lock を変えるため gate の主目的には十分。手動 PR の
          # 非 .nix 閉包変更は取りこぼしうる (auto-merge されないので影響は限定的)。
          # gh が失敗した時は fail-safe で relevant=true にする (空扱い→skip だと脆弱性を
          # すり抜けるため。判定不能なら scan する側に倒す)。
          if ! files=$(gh pr view "$PR" --json files -q '.files[].path' 2>gh_err.txt); then
            echo "::warning::gh pr view 失敗 ($(tr '\n' ' ' < gh_err.txt))。fail-safe で relevant=true (scan 実行)。"
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed files:"; printf '%s\n' "$files"
          if printf '%s\n' "$files" | grep -Eq '(^|/)flake\.lock$|(^|/)flake\.nix$|\.nix$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "::notice::閉包関連ファイル変更あり → scan + delta-gate を実行"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::閉包関連ファイル変更なし → scan skip / delta-gate は pass"
          fi

  discover:
    needs: [changes]
    # changes は全イベントで実行され relevant を出す (非 PR は常に true)。always() を付けず
    # 「成功した changes の出力」に依存することで、reusable workflow の outputs 伝播を正常化する
    # (skip された need を持たせない)。
    if: needs.changes.outputs.relevant == 'true'
    uses: shinbunbun/nix-ci-workflows/.github/workflows/discover-targets.yaml@main
    with:
      runner: 'ubuntu-latest'

  # [非 PR] フル vulnxscan (vulnix+grype+osv+triage)。#283 集約と baseline closure-paths を産む。
  # PR では走らせない (PR は下の diff-gate-* で「差分のみ」を vulnix 検査する = 速い)。
  scan-nixos:
    needs: discover
    if: github.event_name != 'pull_request' && needs.discover.outputs.has-nixos == 'true'
    strategy:
      # report-only スキャンなので 1 ターゲットの失敗で他ターゲットを cancel しない
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.nixos-matrix) }}
    uses: shinbunbun/nix-ci-workflows/.github/workflows/scan-vulnerabilities.yaml@main
    with:
      runner: 'ubuntu-latest'
      target: ".#nixosConfigurations.${{ matrix.configuration }}.config.system.build.toplevel"
      whitelist: '.github/vulnxscan-whitelist.csv'
      # unfree パッケージ (terraform 等) は公開キャッシュに無いため Attic から substitute する
      use-attic: true
    secrets:
      # NVD API key を reusable に forward (identity 判定の NVD CPE 照会の rate-limit 緩和)。
      # reusable 側は required:false なので未設定でも動く。
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      ATTIC_READ_TOKEN: ${{ secrets.ATTIC_READ_TOKEN }}
      ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}

  scan-darwin:
    needs: discover
    if: github.event_name != 'pull_request' && needs.discover.outputs.has-darwin == 'true'
    strategy:
      # report-only スキャンなので 1 ターゲットの失敗で他ターゲットを cancel しない
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.darwin-matrix) }}
    uses: shinbunbun/nix-ci-workflows/.github/workflows/scan-vulnerabilities.yaml@main
    with:
      runner: 'macos-latest'
      # darwin は vulnix の checkPhase が sandbox 非互換のため doCheck/checkPhase 無効版に差し替える
      vulnix-nocheck: true
      target: ".#darwinConfigurations.${{ matrix.configuration }}.config.system.build.toplevel"
      whitelist: '.github/vulnxscan-whitelist.csv'
      # darwin 閉包は現状公開キャッシュで賄えているが、nixos と同条件に揃える
      use-attic: true
    secrets:
      # NVD API key を reusable に forward (identity 判定の NVD CPE 照会の rate-limit 緩和)。
      # reusable 側は required:false なので未設定でも動く。
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      ATTIC_READ_TOKEN: ${{ secrets.ATTIC_READ_TOKEN }}
      ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}

  # [PR のみ] closure 差分 (= この PR が足したパス) だけを vulnix で検査する producer。
  # flake を build/eval 済みのコンテキスト (= derivers 完備) で vulnix -R Δ を回すため、
  # full scan とは別に diff-gate.yaml を target ごとに走らせる (#347)。introduced-*.json を出す。
  diff-gate-nixos:
    needs: discover
    if: github.event_name == 'pull_request' && needs.discover.outputs.has-nixos == 'true'
    # reusable diff-gate.yaml が base closure-paths を gh run download するため actions:read が要る。
    # 呼び出し job 側で宣言しないと caller top-level (contents:read) を超過し startup_failure になる。
    # id-token:write は WireGuard action (peer-issuer の OIDC 認証) 用。
    permissions:
      contents: read
      actions: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.nixos-matrix) }}
    uses: shinbunbun/nix-ci-workflows/.github/workflows/diff-gate.yaml@main
    with:
      runner: 'ubuntu-latest'
      target: ".#nixosConfigurations.${{ matrix.configuration }}.config.system.build.toplevel"
      use-attic: true
      # GitHub-hosted runner を WireGuard(peer-issuer) で LAN に入れ、公開せず LAN VIP の
      # NVD ミラーを使う (vulnix の NVD 直取得 timeout 由来 fail-closed 偽ブロックを回避)。
      # ci.yaml の build ジョブと同じ WireGuard パターン。
      needs-wireguard: true
      wireguard-allowed-ips: '192.168.128.26/32'
      nvd-mirror: 'http://192.168.128.26/'
    secrets:
      ATTIC_READ_TOKEN: ${{ secrets.ATTIC_READ_TOKEN }}
      ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
      AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}

  diff-gate-darwin:
    needs: discover
    if: github.event_name == 'pull_request' && needs.discover.outputs.has-darwin == 'true'
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.darwin-matrix) }}
    uses: shinbunbun/nix-ci-workflows/.github/workflows/diff-gate.yaml@main
    with:
      runner: 'macos-latest'
      vulnix-nocheck: true
      target: ".#darwinConfigurations.${{ matrix.configuration }}.config.system.build.toplevel"
      use-attic: true
    secrets:
      ATTIC_READ_TOKEN: ${{ secrets.ATTIC_READ_TOKEN }}
      ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}

  # [非 PR] 各ターゲットの NOTIFY (artifact) を集約し、集約 Issue を 1 本 upsert する。
  # PR コンテキストでは走らせない (PR の閉包で集約 Issue を先食い upsert しないため。代わりに delta-gate)。
  aggregate:
    needs: [scan-nixos, scan-darwin]
    if: always() && github.event_name != 'pull_request' && (needs.scan-nixos.result == 'success' || needs.scan-darwin.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout nix-ci-workflows helpers
        uses: actions/checkout@v6
        with:
          repository: shinbunbun/nix-ci-workflows
          ref: main
          path: .nix-ci-workflows
      - name: Install Nix with flakes enabled
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
      - name: Download NOTIFY reports
        uses: actions/download-artifact@v8
        with:
          pattern: vulnxscan-signal-*
          path: signals
      - name: Aggregate & upsert issue
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          nix run nixpkgs#python3 -- \
            .nix-ci-workflows/ci/scripts/vulnxscan_aggregate.py signals

  # [PR のみ・required status check] diff-gate aggregator (#347)。diff-gate-* producer が出した
  # introduced-*.json を集約し、新規流入 CVE を PR コメントに upsert する。脆弱性データは
  # producer (head 側 vulnix の 1 スキャン) からのみ来るため、baseline 時刻ずれ/DB ドリフト/
  # NVD 404 起因の誤検出 (glibc 等) は構造的に発生しない。job 名は required status check 名を
  # 保つため delta-gate のまま。閉包関連変更が無い PR では即 pass (always 実行で必ず報告)。
  delta-gate:
    needs: [changes, discover, diff-gate-nixos, diff-gate-darwin]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Pass when no closure change
        if: needs.changes.result == 'success' && needs.changes.outputs.relevant == 'false'
        run: echo "::notice::flake.lock/*.nix 変更なし → 脆弱性流入なし、diff-gate pass"
      - name: Fail closed when change-detection is indeterminate
        # changes ジョブが infra 失敗等で判定 (true/false) を出せなかった場合、fail-open を避けて block。
        if: needs.changes.result != 'success' || (needs.changes.outputs.relevant != 'true' && needs.changes.outputs.relevant != 'false')
        run: |
          echo "::error::changes ジョブが閉包変更の判定を出せませんでした (infra 失敗等)。"
          echo "::error::fail-closed で gate を block します。ジョブを re-run してください。"
          exit 1
      - name: Fail closed when discover or a diff-gate producer failed
        # producer (diff-gate-*) が introduced.json 書込前にクラッシュ/discover が失敗すると、
        # その target が集約から不可視になり fail-open する。success/skipped 以外 (failure・cancelled)
        # を捕まえて block する (skipped = 対象 target 無しは正常なので block しない)。
        if: >-
          needs.changes.outputs.relevant == 'true' && (
            (needs.discover.result != 'success' && needs.discover.result != 'skipped') ||
            (needs.diff-gate-nixos.result != 'success' && needs.diff-gate-nixos.result != 'skipped') ||
            (needs.diff-gate-darwin.result != 'success' && needs.diff-gate-darwin.result != 'skipped')
          )
        run: |
          echo "::error::diff-gate producer/discover が失敗しました (discover=${{ needs.discover.result }} / nixos=${{ needs.diff-gate-nixos.result }} / darwin=${{ needs.diff-gate-darwin.result }})。"
          echo "::error::集約から漏れる target が新規流入をすり抜けるのを避けるため fail-closed で block します。re-run してください。"
          exit 1
      - name: Checkout nix-ci-workflows helpers
        if: needs.changes.outputs.relevant == 'true'
        uses: actions/checkout@v6
        with:
          repository: shinbunbun/nix-ci-workflows
          ref: main
          path: .nix-ci-workflows
      - name: Install Nix with flakes enabled
        if: needs.changes.outputs.relevant == 'true'
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
      - name: Download introduced findings (diff-gate producers)
        if: needs.changes.outputs.relevant == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: vulnxscan-introduced-*
          path: introduced
      - name: Aggregate, comment & gate
        if: needs.changes.outputs.relevant == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # introduced-*.json を集約して PR コメント upsert。
          # --gate: 新規流入 > 0 / producer の scan 未完走 なら exit 1 → required check fail → block。
          nix run nixpkgs#python3 -- \
            .nix-ci-workflows/ci/scripts/vulnxscan_diff_gate.py gate \
            introduced "${{ github.event.pull_request.number }}" --gate
